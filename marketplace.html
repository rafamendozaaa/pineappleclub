<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Parking Haus — Park Smart. Earn More.</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────────────────────────
   GLOBAL DESIGN TOKENS — single source of truth.
   Every component references these via var(); no raw hex in components.
   ───────────────────────────────────────────────────────────── */
:root{
  --color-primary:#1A6BF0;          /* Driver CTA */
  --color-primary-700:#1557C4;      /* Driver CTA hover */
  --color-primary-50:#EAF2FE;       /* Driver tint */
  --color-secondary:#F59E0B;        /* Host CTA */
  --color-secondary-700:#D97F06;    /* Host CTA hover */
  --color-secondary-50:#FEF6E7;     /* Host tint */
  --color-bg:#F8FAFC;
  --color-surface:#FFFFFF;
  --color-text:#0F172A;
  --color-muted:#64748B;
  --color-border:#E2E8F0;
  --color-success:#16A34A;
  --color-danger:#DC2626;
  --color-on-primary:#FFFFFF;
  --overlay-scrim:rgba(0,0,0,0.45);            /* text-over-image overlay (>= 0.4) */
  --overlay-scrim-strong:rgba(0,0,0,0.62);
  --radius-card:12px;
  --radius-button:8px;
  --radius-pill:999px;
  --shadow-card:0 2px 12px rgba(0,0,0,0.08);
  --shadow-pop:0 16px 48px rgba(15,23,42,0.18);
  --font-heading:'Sora',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --maxw:1080px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{min-height:100vh;}
body{background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:var(--font-heading);color:var(--color-text);line-height:1.1;}
button{font-family:var(--font-body);cursor:pointer;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:var(--radius-pill);}

/* ── Buttons (shared across all pages) ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius-button);font-weight:600;font-size:15px;padding:10px 16px;transition:background .15s,border-color .15s,transform .05s;text-decoration:none;color:var(--color-text);}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--color-primary);color:var(--color-on-primary);}
.btn-primary:hover{background:var(--color-primary-700);}
.btn-secondary{background:var(--color-secondary);color:var(--color-text);}
.btn-secondary:hover{background:var(--color-secondary-700);}
.btn-ghost{background:transparent;color:var(--color-text);}
.btn-ghost:hover{background:var(--color-border);}
.btn-outline{background:var(--color-surface);color:var(--color-text);border:1px solid var(--color-border);}
.btn-outline:hover{border-color:var(--color-muted);}
.btn-sm{padding:8px 14px;font-size:14px;}
.btn-block{width:100%;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
/* Hero CTAs: min 200x56 on desktop */
.btn-cta{min-width:200px;height:56px;font-size:16px;font-weight:700;border-radius:var(--radius-button);}

/* ── Nav ── */
.nav{position:sticky;top:0;z-index:50;background:var(--color-surface);border-bottom:1px solid var(--color-border);}
.nav-inner{max-width:var(--maxw);margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:18px;}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--font-heading);font-weight:800;font-size:19px;color:var(--color-text);background:none;border:none;}
.brand span{color:var(--color-primary);}
.brand .blob{width:30px;height:30px;border-radius:9px;background:var(--color-primary);color:var(--color-on-primary);display:flex;align-items:center;justify-content:center;}
.nav-links{display:flex;gap:6px;margin-left:8px;}
.nav-links button{background:none;border:none;color:var(--color-muted);font-size:15px;font-weight:500;padding:8px 10px;border-radius:var(--radius-button);}
.nav-links button:hover{color:var(--color-text);background:var(--color-bg);}
.nav-cta{margin-left:auto;display:flex;gap:8px;align-items:center;}

/* ── Layout ── */
.section{max-width:var(--maxw);margin:0 auto;padding:0 20px;}
.eyebrow{font-family:var(--font-heading);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--color-primary);}

/* ── Hero (max 3 visual elements above the fold: copy / CTAs / search) ── */
.hero{background:linear-gradient(180deg,var(--color-surface) 0%,var(--color-bg) 100%);border-bottom:1px solid var(--color-border);}
.hero-inner{max-width:var(--maxw);margin:0 auto;padding:64px 20px 56px;text-align:center;}
.hero h1{font-size:54px;font-weight:800;letter-spacing:-.02em;margin-bottom:14px;}
.hero h1 span{color:var(--color-primary);}
.hero-sub{font-size:18px;color:var(--color-muted);max-width:620px;margin:0 auto 30px;}
.cta-row{display:flex;gap:14px;justify-content:center;margin-bottom:26px;flex-wrap:wrap;}
.searchbar{display:flex;gap:8px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:8px;max-width:760px;margin:0 auto;align-items:center;}
.sb-field{display:flex;align-items:center;gap:8px;padding:8px 10px;flex:1;min-width:0;border-radius:var(--radius-button);}
.sb-field + .sb-field{border-left:1px solid var(--color-border);}
.sb-field input{border:none;outline:none;font-family:var(--font-body);font-size:14px;color:var(--color-text);background:transparent;width:100%;min-width:0;}
.sb-field input::placeholder{color:var(--color-muted);}
.sb-field svg{color:var(--color-muted);flex-shrink:0;}

/* ── Benefit tiles ── */
.benefits{padding:56px 0;}
.bn-group + .bn-group{margin-top:38px;}
.bn-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.bn-head h3{font-size:22px;font-weight:700;}
.bn-pill{font-size:12px;font-weight:700;padding:4px 10px;border-radius:var(--radius-pill);}
.bn-pill.driver{background:var(--color-primary-50);color:var(--color-primary-700);}
.bn-pill.host{background:var(--color-secondary-50);color:var(--color-secondary-700);}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.tile{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-card);padding:20px;box-shadow:var(--shadow-card);}
.tile-ic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.tile-ic.driver{background:var(--color-primary-50);color:var(--color-primary);}
.tile-ic.host{background:var(--color-secondary-50);color:var(--color-secondary-700);}
.tile h4{font-size:16px;font-weight:700;margin-bottom:5px;}
.tile p{font-size:14px;color:var(--color-muted);}

/* ── Section heading ── */
.sec-head{text-align:center;margin-bottom:26px;}
.sec-head h2{font-size:32px;font-weight:800;letter-spacing:-.01em;margin-bottom:6px;}
.sec-head p{color:var(--color-muted);font-size:16px;}

/* ── Listing cards ── */
.listings{padding:8px 0 64px;}
.listing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.lc{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-card);box-shadow:var(--shadow-card);overflow:hidden;display:flex;flex-direction:column;}
/* image wrapper: fixed aspect, never collapses, clips overflow */
.lc-imgwrap{position:relative;width:100%;aspect-ratio:16/9;min-height:180px;overflow:hidden;background:var(--color-border);}
.lc-img{width:100%;height:100%;object-fit:cover;display:block;}
.lc-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:var(--color-border);color:var(--color-muted);}
.lc-placeholder span{font-size:12px;font-weight:600;}
/* bottom scrim so any text over the image stays >=4.5:1 contrast */
.lc-scrim{position:absolute;left:0;right:0;bottom:0;height:62%;background:linear-gradient(180deg,rgba(0,0,0,0) 0%,var(--overlay-scrim-strong) 100%);}
.lc-price{position:absolute;left:12px;bottom:12px;color:#fff;font-family:var(--font-heading);font-weight:700;font-size:18px;text-shadow:0 1px 2px rgba(0,0,0,.5);}
.lc-price small{font-family:var(--font-body);font-weight:500;font-size:12px;opacity:.92;}
.lc-rating{position:absolute;right:12px;top:12px;display:flex;align-items:center;gap:4px;background:var(--overlay-scrim);color:#fff;padding:4px 9px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;backdrop-filter:blur(4px);}
.lc-rating svg{color:var(--color-secondary);}
.lc-fav{position:absolute;right:12px;bottom:12px;width:36px;height:36px;border-radius:var(--radius-pill);background:var(--color-surface);border:none;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-card);color:var(--color-text);}
.lc-fav.on{color:var(--color-danger);}
.lc-body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1;}
.lc-title{font-family:var(--font-heading);font-size:16px;font-weight:700;}
.lc-row{display:flex;align-items:center;gap:6px;color:var(--color-muted);font-size:13px;}
.lc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
.lc-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--color-text);background:var(--color-bg);border:1px solid var(--color-border);padding:3px 8px;border-radius:var(--radius-pill);}
.lc-foot{display:flex;align-items:center;gap:8px;border-top:1px solid var(--color-border);padding-top:10px;margin-top:auto;}
.lc-host{width:28px;height:28px;border-radius:var(--radius-pill);background:var(--color-primary-50);color:var(--color-primary-700);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.lc-host-name{font-size:13px;color:var(--color-muted);}

/* ── Sign-up wizard ── */
.wiz-scrim{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:100;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 16px;}
.wiz{background:var(--color-surface);border-radius:var(--radius-card);box-shadow:var(--shadow-pop);width:100%;max-width:520px;overflow:hidden;animation:wpop .2s ease;}
@keyframes wpop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.wiz-top{padding:16px 20px;border-bottom:1px solid var(--color-border);display:flex;align-items:center;gap:12px;}
.wiz-close{margin-left:auto;width:32px;height:32px;border-radius:var(--radius-button);border:none;background:var(--color-bg);color:var(--color-muted);display:flex;align-items:center;justify-content:center;}
.wiz-close:hover{color:var(--color-text);}
/* progress: Role -> Account -> Profile -> Done */
.steps{display:flex;align-items:center;gap:0;padding:16px 20px 4px;}
.step{display:flex;align-items:center;gap:8px;flex:1;}
.step:last-child{flex:0;}
.step-dot{width:26px;height:26px;border-radius:var(--radius-pill);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;border:2px solid var(--color-border);background:var(--color-surface);color:var(--color-muted);}
.step.active .step-dot{border-color:var(--color-primary);color:var(--color-primary);}
.step.done .step-dot{border-color:var(--color-primary);background:var(--color-primary);color:var(--color-on-primary);}
.step-label{font-size:12px;font-weight:600;color:var(--color-muted);white-space:nowrap;}
.step.active .step-label,.step.done .step-label{color:var(--color-text);}
.step-line{flex:1;height:2px;background:var(--color-border);margin:0 8px;border-radius:2px;}
.step.done .step-line{background:var(--color-primary);}
.wiz-body{padding:20px 24px 24px;}
.wiz-h{font-family:var(--font-heading);font-size:22px;font-weight:700;margin-bottom:4px;}
.wiz-sub{color:var(--color-muted);font-size:14px;margin-bottom:18px;}

/* role cards */
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.role-card{text-align:left;background:var(--color-surface);border:2px solid var(--color-border);border-radius:var(--radius-card);padding:18px;transition:border-color .15s,box-shadow .15s;}
.role-card:hover{border-color:var(--color-muted);}
.role-card.sel-driver{border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-50);}
.role-card.sel-host{border-color:var(--color-secondary);box-shadow:0 0 0 3px var(--color-secondary-50);}
.role-illus{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.role-illus.driver{background:var(--color-primary-50);color:var(--color-primary);}
.role-illus.host{background:var(--color-secondary-50);color:var(--color-secondary-700);}
.role-card h4{font-size:16px;font-weight:700;margin-bottom:4px;}
.role-card p{font-size:13px;color:var(--color-muted);}

/* forms */
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;}
.field label .opt{color:var(--color-muted);font-weight:500;}
.input{width:100%;border:1px solid var(--color-border);border-radius:var(--radius-button);padding:11px 12px;font-family:var(--font-body);font-size:15px;color:var(--color-text);background:var(--color-surface);outline:none;}
.input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-50);}
.input.invalid{border-color:var(--color-danger);}
.hint{font-size:12px;margin-top:5px;display:flex;align-items:center;gap:5px;}
.hint.err{color:var(--color-danger);}
.hint.ok{color:var(--color-success);}
.hint.muted{color:var(--color-muted);}
/* password strength meter */
.pw-meter{display:flex;gap:4px;margin-top:8px;}
.pw-seg{height:5px;flex:1;border-radius:var(--radius-pill);background:var(--color-border);transition:background .2s;}
.pw-label{font-size:12px;font-weight:600;margin-top:5px;}
.oauth{display:flex;flex-direction:column;gap:10px;margin-bottom:6px;}
.oauth-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:46px;border:1px solid var(--color-border);border-radius:var(--radius-button);background:var(--color-surface);font-weight:600;font-size:15px;color:var(--color-text);}
.oauth-btn:hover{background:var(--color-bg);}
.divider{display:flex;align-items:center;gap:12px;color:var(--color-muted);font-size:12px;margin:16px 0;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--color-border);}
.wiz-actions{display:flex;gap:10px;margin-top:20px;}
.wiz-actions .btn{flex:1;height:46px;}

/* success */
.success{text-align:center;padding:8px 0 4px;}
.success-badge{width:72px;height:72px;border-radius:var(--radius-pill);background:var(--color-success);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.success h3{font-size:24px;font-weight:800;margin-bottom:6px;}
.success p{color:var(--color-muted);margin-bottom:22px;}

/* ── Style guide ── */
.sg{padding:40px 0 80px;}
.sg-block{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:22px;margin-bottom:18px;}
.sg-block h3{font-size:18px;font-weight:700;margin-bottom:4px;}
.sg-block .sg-desc{color:var(--color-muted);font-size:13px;margin-bottom:16px;}
.sw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.sw{border:1px solid var(--color-border);border-radius:var(--radius-button);overflow:hidden;}
.sw-color{height:64px;}
.sw-meta{padding:8px 10px;}
.sw-name{font-size:13px;font-weight:700;}
.sw-val{font-size:12px;color:var(--color-muted);font-family:ui-monospace,monospace;}
.radii{display:flex;gap:16px;flex-wrap:wrap;}
.radii .box{width:90px;height:64px;background:var(--color-primary-50);border:1px solid var(--color-primary);display:flex;align-items:flex-end;justify-content:center;padding:6px;font-size:11px;font-weight:700;color:var(--color-primary-700);}
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;}
.icon-cell{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:1px solid var(--color-border);border-radius:var(--radius-button);color:var(--color-text);}
.icon-cell span{font-size:11px;color:var(--color-muted);font-family:ui-monospace,monospace;}
.density-row{display:flex;align-items:flex-end;gap:22px;color:var(--color-text);}
.density-row .d{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;color:var(--color-muted);}
.type-sample p{margin-bottom:8px;}
.btn-demo{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}

/* ── Footer ── */
.footer{border-top:1px solid var(--color-border);background:var(--color-surface);}
.footer-inner{max-width:var(--maxw);margin:0 auto;padding:28px 20px;display:flex;align-items:center;gap:10px;color:var(--color-muted);font-size:13px;flex-wrap:wrap;}
.footer .brand{font-size:16px;}

/* ── "Your listing" badge on a listing card ── */
.lc-mine{align-self:flex-start;font-size:11px;font-weight:700;color:var(--color-secondary-700);background:var(--color-secondary-50);border:1px solid var(--color-secondary);padding:2px 8px;border-radius:var(--radius-pill);}

/* ── List-a-spot (host) ── */
.ls{padding:30px 0 72px;}
.ls-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--color-muted);font-size:14px;font-weight:600;margin-bottom:14px;}
.ls-back:hover{color:var(--color-text);}
.ls-grid{display:grid;grid-template-columns:1fr 360px;gap:26px;align-items:start;}
.ls-form{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-card);box-shadow:var(--shadow-card);padding:22px;}
.ls-row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.select{width:100%;border:1px solid var(--color-border);border-radius:var(--radius-button);padding:11px 12px;font-family:var(--font-body);font-size:15px;color:var(--color-text);background:var(--color-surface);outline:none;}
.select:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px var(--color-primary-50);}
.am-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.am{display:flex;align-items:center;gap:8px;border:1px solid var(--color-border);border-radius:var(--radius-button);padding:10px 12px;font-size:14px;font-weight:600;color:var(--color-text);background:var(--color-surface);cursor:pointer;text-align:left;}
.am.on{border-color:var(--color-secondary);background:var(--color-secondary-50);color:var(--color-secondary-700);}
.am .am-chk{margin-left:auto;}
.ls-preview{position:sticky;top:88px;}
.pv-label{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-muted);margin-bottom:8px;}
.ls-success{max-width:430px;margin:18px auto 0;text-align:center;}

/* ── Responsive ── */
@media(max-width:860px){
  .tiles,.listing-grid{grid-template-columns:1fr 1fr;}
  .ls-grid{grid-template-columns:1fr;}
  .ls-preview{position:static;max-width:360px;}
}
@media(max-width:640px){
  .hero h1{font-size:38px;}
  .hero-sub{font-size:16px;}
  .nav-links{display:none;}
  /* CTAs stack vertically, full-width on mobile */
  .cta-row{flex-direction:column;align-items:stretch;}
  .btn-cta{width:100%;}
  .searchbar{flex-direction:column;align-items:stretch;}
  .sb-field + .sb-field{border-left:none;border-top:1px solid var(--color-border);}
  .tiles,.listing-grid{grid-template-columns:1fr;}
  .role-cards{grid-template-columns:1fr;}
  .ls-row2,.am-grid{grid-template-columns:1fr;}
  .hero h1{font-size:34px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo}=React;

/* ───────── Icons — single library (Lucide line icons), fixed px sizing ─────────
   Rendered as inline SVG with explicit width/height (never font-size scaled).
   role/aria are set so icon-only buttons stay accessible. SVG = crisp at 1x/1.5x/2x. */
const ICONS={
  search:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  mapPin:'<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>',
  calendar:'<rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',

function Icon({name,size=20,label,color}){

    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"

      style={{display:'block',flexShrink:0}} {...aria}

  );
}

function gradientPhoto(a,b){
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='400' height='225'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='${a}'/><stop offset='1' stop-color='${b}'/></linearGradient></defs><rect width='400' height='225' fill='url(#g)'/><rect x='40' y='150' width='320' height='8' rx='4' fill='rgba(255,255,255,0.25)'/><rect x='40' y='168' width='220' height='8' rx='4' fill='rgba(255,255,255,0.18)'/></svg>`;
  return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
}

function ListingCard({l}){
  const [failed,setFailed]=useState(!l.img);
  const [fav,setFav]=useState(false);
  return (
    <article className="lc">
      <div className="lc-imgwrap">
        {failed
          ? <div className="lc-placeholder"><Icon name="image" size={28} label="Photo unavailable"/><span>No photo yet</span></div>
          : <img className="lc-img" src={l.img} alt={`${l.title} — ${l.loc}`} loading="lazy" onError={()=>setFailed(true)}/>}
        <div className="lc-scrim"/>
        <div className="lc-rating">{typeof l.rating==='number' ? <><StarSolid/> {l.rating.toFixed(1)}</> : 'New'}</div>
        <div className="lc-price">${l.price}<small>{l.unit}</small></div>
        <button className={`lc-fav ${fav?'on':''}`} aria-label={fav?'Remove from saved':'Save listing'} aria-pressed={fav} onClick={()=>setFav(f=>!f)}>
          <Icon name="heart" size={18}/>
        </button>
      </div>
      <div className="lc-body">
        {l.mine && <span className="lc-mine">Your listing</span>}
        <div className="lc-title">{l.title}</div>
        <div className="lc-row"><Icon name="mapPin" size={15}/> {l.loc}</div>
        <div className="lc-tags">
          {l.tags.map(([ic,t])=> <span className="lc-tag" key={t}><Icon name={ic} size={13}/> {t}</span>)}
        </div>
        <div className="lc-foot">
          <div className="lc-host">{l.host[0]}</div>
          <div className="lc-host-name">Hosted by {l.host}</div>
        </div>
      </div>
    </article>
  );
}

/* ───────── Sign-up wizard ───────── */
const STEP_LABELS=['Role','Account','Profile','Done'];
const emailOk=(e)=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
function pwScore(p){
  let s=0;
  if(p.length>=8)s++;
  if(/[A-Z]/.test(p)&&/[a-z]/.test(p))s++;
  if(/\d/.test(p))s++;
  if(/[^A-Za-z0-9]/.test(p))s++;
  return s; // 0..4
}
const PW_META=[
  {label:'Too short',color:'var(--color-border)'},
  {label:'Weak',color:'var(--color-danger)'},
  {label:'Fair',color:'var(--color-secondary)'},
  {label:'Good',color:'var(--color-primary)'},
  {label:'Strong',color:'var(--color-success)'},
];

function SignupWizard({initialRole,onClose,onFinish}){
  const saved=(()=>{try{return JSON.parse(localStorage.getItem('mkt_signup'))||{};}catch{return {};}})();
  const [step,setStep]=useState(saved.step??0);
  const [role,setRole]=useState(saved.role||initialRole||null);
  const [email,setEmail]=useState(saved.email||'');
  const [password,setPassword]=useState(''); // never persisted
  const [profile,setProfile]=useState(saved.profile||{name:'',vehicle:'',payment:'',address:'',availability:'',price:''});
  const [touched,setTouched]=useState({});

  // Persist partial progress (excluding password) so a refresh doesn't lose data
  useEffect(()=>{
    try{localStorage.setItem('mkt_signup',JSON.stringify({step,role,email,profile}));}catch{}
  },[step,role,email,profile]);

  const pf=(k)=>(e)=>setProfile(p=>({...p,[k]:e.target.value}));
  const score=pwScore(password);
  const emailValid=emailOk(email);
  const pwValid=password.length>=8;
  const accountValid=emailValid&&pwValid;
  const firstName=(profile.name.trim().split(/\s+/)[0])||'there';

  const pickRole=(r)=>{ setRole(r); setStep(1); }; // auto-advance on selection
  const back=()=>setStep(s=>Math.max(0,s-1));
  const finishStep=()=>{ try{localStorage.removeItem('mkt_signup');}catch{} onFinish&&onFinish(role, profile); onClose(); };

  const profileValid = role==='host'
    ? profile.name.trim() && profile.address.trim() && profile.price.trim()
    : profile.name.trim();

  return (
    <div className="wiz-scrim" onMouseDown={(e)=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="wiz" role="dialog" aria-modal="true" aria-label="Sign up">
        <div className="wiz-top">
          <div className="brand"><span className="blob"><Icon name="car" size={18}/></span> Parking<span>Haus</span></div>
          <button className="wiz-close" aria-label="Close sign up" onClick={onClose}><Icon name="close" size={18}/></button>
        </div>

        {/* Progress: Role -> Account -> Profile -> Done */}
        <div className="steps">
          {STEP_LABELS.map((lab,i)=>(
            <div className={`step ${i===step?'active':''} ${i<step?'done':''}`} key={lab}>
              <div className="step-dot">{i<step?<Icon name="check" size={14}/>:i+1}</div>
              <div className="step-label">{lab}</div>
              {i<STEP_LABELS.length-1 && <div className="step-line"/>}
            </div>
          ))}
        </div>

        <div className="wiz-body">
          {step===0 && (
            <div>
              <div className="wiz-h">Are you a Driver/Fan or a Host?</div>
              <div className="wiz-sub">Pick one to personalize your setup. You can do both later.</div>
              <div className="role-cards">
                <button className={`role-card ${role==='driver'?'sel-driver':''}`} onClick={()=>pickRole('driver')} aria-pressed={role==='driver'}>
                  <div className="role-illus driver"><Icon name="car" size={28}/></div>
                  <h4>Driver / Fan</h4>
                  <p>I need to park near a venue or in the city.</p>
                </button>
                <button className={`role-card ${role==='host'?'sel-host':''}`} onClick={()=>pickRole('host')} aria-pressed={role==='host'}>
                  <div className="role-illus host"><Icon name="home" size={28}/></div>
                  <h4>Host</h4>
                  <p>I have a spot or driveway to rent out.</p>
                </button>
              </div>
            </div>
          )}

          {step===1 && (
            <div>
              <div className="wiz-h">Create your account</div>
              <div className="wiz-sub">Continue with a provider or use your email.</div>
              <div className="oauth">
                <button className="oauth-btn" type="button" onClick={()=>setStep(2)}><GoogleMark/> Continue with Google</button>
                <button className="oauth-btn" type="button" onClick={()=>setStep(2)}><AppleMark/> Continue with Apple</button>
              </div>
              <div className="divider">or sign up with email</div>
              <div className="field">
                <label htmlFor="su-email">Email</label>
                <input id="su-email" className={`input ${touched.email&&!emailValid?'invalid':''}`} type="email" inputMode="email"
                  placeholder="you@email.com" value={email}
                  onChange={(e)=>setEmail(e.target.value)} onBlur={()=>setTouched(t=>({...t,email:true}))}/>
                {touched.email&&!emailValid
                  ? <div className="hint err"><Icon name="close" size={13}/> Enter a valid email address</div>
                  : emailValid && <div className="hint ok"><Icon name="check" size={13}/> Looks good</div>}
              </div>
              <div className="field">
                <label htmlFor="su-pw">Password</label>
                <input id="su-pw" className={`input ${touched.pw&&!pwValid?'invalid':''}`} type="password"
                  placeholder="At least 8 characters" value={password}
                  onChange={(e)=>setPassword(e.target.value)} onBlur={()=>setTouched(t=>({...t,pw:true}))}/>
                <div className="pw-meter" aria-hidden="true">
                  {[0,1,2,3].map(i=> <div className="pw-seg" key={i} style={{background:i<score?PW_META[score].color:'var(--color-border)'}}/>)}
                </div>
                {password
                  ? <div className={`hint ${pwValid?'ok':'muted'}`} style={{color:PW_META[score].color}}>{PW_META[score].label}{!pwValid?' — password must be 8+ characters':''}</div>
                  : <div className="hint muted">Password must be 8+ characters</div>}
              </div>
              <div className="wiz-actions">
                <button className="btn btn-outline" onClick={back}><Icon name="arrowLeft" size={18}/> Back</button>
                <button className="btn btn-primary" disabled={!accountValid} onClick={()=>setStep(2)}>Continue</button>
              </div>
            </div>
          )}

          {step===2 && (
            <div>
              <div className="wiz-h">{role==='host'?'Tell us about your spot':'Complete your profile'}</div>
              <div className="wiz-sub">{role==='host'?'Just the basics — you can refine your listing next.':'A couple of details and you\'re in.'}</div>

              {role==='host' ? (
                <div>
                  <div className="field">
                    <label htmlFor="p-name">Full name</label>
                    <input id="p-name" className="input" placeholder="Jordan Vega" value={profile.name} onChange={pf('name')}/>
                  </div>
                  <div className="field">
                    <label htmlFor="p-addr">Parking spot address</label>
                    <input id="p-addr" className="input" placeholder="Street, number, city" value={profile.address} onChange={pf('address')}/>
                  </div>
                  <div className="field">
                    <label htmlFor="p-avail">Availability <span className="opt">(optional)</span></label>
                    <input id="p-avail" className="input" placeholder="e.g. Weekends & event nights" value={profile.availability} onChange={pf('availability')}/>
                  </div>
                  <div className="field">
                    <label htmlFor="p-price">Price per day (USD)</label>
                    <input id="p-price" className="input" type="number" min="1" placeholder="12" value={profile.price} onChange={pf('price')}/>
                  </div>
                </div>
              ) : (
                <div>
                  <div className="field">
                    <label htmlFor="p-name">Full name</label>
                    <input id="p-name" className="input" placeholder="Alex Driver" value={profile.name} onChange={pf('name')}/>
                  </div>
                  <div className="field">
                    <label htmlFor="p-veh">Vehicle <span className="opt">(optional)</span></label>
                    <input id="p-veh" className="input" placeholder="Toyota Corolla · AC 234 LR" value={profile.vehicle} onChange={pf('vehicle')}/>
                  </div>
                  <div className="field">
                    <label htmlFor="p-pay">Payment method <span className="opt">(optional)</span></label>
                    <input id="p-pay" className="input" placeholder="Card ending 4242" value={profile.payment} onChange={pf('payment')}/>
                  </div>
                </div>
              )}

              <div className="wiz-actions">
                <button className="btn btn-outline" onClick={back}><Icon name="arrowLeft" size={18}/> Back</button>
                <button className="btn btn-primary" disabled={!profileValid} onClick={()=>setStep(3)}>Finish</button>
              </div>
            </div>
          )}

          {step===3 && (
            <div>
              <div className="success">
                <div className="success-badge"><Icon name="check" size={36} label="Success"/></div>
                <h3>You're all set, {firstName}!</h3>
                <p>{role==='host'
                  ? 'Your account is ready. Publish your first listing to start earning.'
                  : 'Your account is ready. Let\'s find you a spot near the venue.'}</p>
                <button className="btn btn-primary btn-block" style={{height:52,fontSize:16}} onClick={finishStep}>
                  {role==='host' ? <><Icon name="home" size={20}/> List Your First Spot</> : <><Icon name="search" size={20}/> Find Parking Near Me</>}
                </button>
              </div>
              <div className="wiz-actions">
                <button className="btn btn-outline" onClick={back}><Icon name="arrowLeft" size={18}/> Back</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ───────── Style guide ───────── */
function StyleGuide(){
  const radii=[['--radius-button','8px'],['--radius-card','12px'],['--radius-pill','999px']];
  const iconNames=Object.keys(ICONS);
  return (
    <section className="section sg">
      <div className="sec-head"><h2>Style guide</h2><p>Every component is built from these tokens — no hardcoded values.</p></div>

      <div className="sg-block">
        <h3>Color tokens</h3>
        <div className="sg-desc">Referenced as <code>var(--token)</code> everywhere.</div>
        <div className="sw-grid">
          {TOKENS.map(t=>(
            <div className="sw" key={t.name}>
              <div className="sw-color" style={{background:`var(${t.name})`}}/>
              <div className="sw-meta"><div className="sw-name">{t.note}</div><div className="sw-val">{t.name}</div><div className="sw-val">{t.val}</div></div>
            </div>
          ))}
        </div>
      </div>

      <div className="sg-block">
        <h3>Typography</h3>
        <div className="sg-desc">Headings: <code>--font-heading</code> (Sora) · Body: <code>--font-body</code> (DM Sans)</div>
        <div className="type-sample">
          <p style={{fontFamily:'var(--font-heading)',fontWeight:800,fontSize:34}}>Park Smart. Earn More.</p>
          <p style={{fontFamily:'var(--font-heading)',fontWeight:700,fontSize:22}}>Section heading — Sora 700</p>
          <p style={{color:'var(--color-muted)'}}>Body copy in DM Sans. The quick brown fox jumps over the lazy dog.</p>
        </div>
      </div>

      <div className="sg-block">
        <h3>Buttons</h3>
        <div className="sg-desc">Shared classes used on every page.</div>
        <div className="btn-demo">
          <button className="btn btn-primary">Primary</button>
          <button className="btn btn-secondary">Secondary</button>
          <button className="btn btn-outline">Outline</button>
          <button className="btn btn-ghost">Ghost</button>
          <button className="btn btn-cta btn-primary">CTA · 200×56</button>
        </div>
      </div>

      <div className="sg-block">
        <h3>Radii &amp; shadow</h3>
        <div className="sg-desc">Card uses <code>--radius-card</code> + <code>--shadow-card</code>.</div>
        <div className="radii">
          {radii.map(([n,v])=> <div className="box" key={n} style={{borderRadius:`var(${n})`}}>{n.replace('--radius-','')}<br/>{v}</div>)}
          <div className="box" style={{background:'var(--color-surface)',border:'1px solid var(--color-border)',borderRadius:'var(--radius-card)',boxShadow:'var(--shadow-card)',color:'var(--color-muted)'}}>shadow-card</div>
        </div>
      </div>

      <div className="sg-block">
        <h3>Icon set — Lucide line icons</h3>
        <div className="sg-desc">One library, fixed px sizing, SVG (crisp at 1x / 1.5x / 2x retina).</div>
        <div className="icon-grid">
          {iconNames.map(n=> <div className="icon-cell" key={n}><Icon name={n} size={22}/><span>{n}</span></div>)}
        </div>
        <div style={{marginTop:18,borderTop:'1px solid var(--color-border)',paddingTop:16}}>
          <div className="sw-val" style={{marginBottom:10}}>Same icon at fixed sizes (vector = sharp on retina):</div>
          <div className="density-row">
            {[16,20,24,32].map(s=> <div className="d" key={s}><Icon name="mapPin" size={s}/>{s}px</div>)}
          </div>
        </div>
      </div>
    </section>
  );
}

/* ───────── List a spot (host) ───────── */
const AMENITIES=[
  ['shield','Gated'],['zap','EV charging'],['clock','24h access'],
  ['key','Self-park'],['car','Big vehicles'],['sparkles','Covered'],
];
const SPOT_TYPES=['Driveway','Garage','Parking lot','Rooftop','Underground'];
const PHOTO_PRESETS=[['#1A6BF0','#0EA5E9'],['#F59E0B','#F97316'],['#16A34A','#0EA5E9'],['#7C3AED','#1A6BF0']];
const amenityLabel=(ic)=>(AMENITIES.find(a=>a[0]===ic)||[ic,ic])[1];

function ListSpotView({hostProfile={},onPublish,onHome}){
  const [form,setForm]=useState({
    title:'', address:hostProfile.address||'', price:hostProfile.price||'',
    unit:'/day', type:'Driveway', photo:'',
    host:((hostProfile.name||'You').trim().split(/\s+/)[0])||'You',
  });
  const [amenities,setAmenities]=useState(['shield','zap']);
  const [published,setPublished]=useState(null);
  const set=(k)=>(e)=>setForm(f=>({...f,[k]:e.target.value}));
  const toggleAm=(ic)=>setAmenities(a=>a.includes(ic)?a.filter(x=>x!==ic):[...a,ic]);
  const valid=form.title.trim()&&form.address.trim()&&String(form.price).trim()&&Number(form.price)>0;

  const preview={
    id:'preview',
    title:form.title||'Your spot title',
    loc:form.address||'Address appears here',
    price:Number(form.price)||0,
    unit:form.unit,
    rating:null,
    host:form.host||'You',
    tags:amenities.slice(0,3).map(ic=>[ic,amenityLabel(ic)]),
    img:form.photo||gradientPhoto(...PHOTO_PRESETS[form.title.length%PHOTO_PRESETS.length]),
    mine:true,
  };

  const publish=()=>{
    if(!valid) return;
    const listing={...preview,id:'L'+Date.now()};
    onPublish(listing);
    setPublished(listing);
    window.scrollTo(0,0);
  };

  if(published){
    return (
      <section className="section ls">
        <div className="ls-success">
          <div className="success-badge"><Icon name="check" size={36} label="Published"/></div>
          <h3 style={{fontSize:26,fontWeight:800,marginBottom:6}}>Your spot is live!</h3>
          <p style={{color:'var(--color-muted)',marginBottom:18}}>Drivers near the venue can book it now. Here's how it looks:</p>
          <div style={{maxWidth:320,margin:'0 auto 20px'}}><ListingCard l={published}/></div>
          <div className="btn-row" style={{display:'flex',gap:10}}>
            <button className="btn btn-outline" style={{flex:1}} onClick={()=>{setPublished(null);setForm(f=>({...f,title:'',photo:''}));}}>List another</button>
            <button className="btn btn-primary" style={{flex:1}} onClick={onHome}>View on home</button>
          </div>
        </div>
      </section>
    );
  }

  return (
    <section className="section ls">
      <button className="ls-back" onClick={onHome}><Icon name="arrowLeft" size={16}/> Back to home</button>
      <div className="sec-head" style={{textAlign:'left',marginBottom:18}}>
        <h2 style={{fontSize:30}}>List your spot</h2>
        <p>Publish in under a minute — preview updates as you type.</p>
      </div>
      <div className="ls-grid">
        <div className="ls-form">
          <div className="field">
            <label htmlFor="ls-title">Listing title</label>
            <input id="ls-title" className="input" placeholder="Covered garage near the stadium" value={form.title} onChange={set('title')} maxLength={60}/>
          </div>
          <div className="field">
            <label htmlFor="ls-addr">Address</label>
            <input id="ls-addr" className="input" placeholder="Street, number, neighbourhood" value={form.address} onChange={set('address')}/>
          </div>
          <div className="ls-row2">
            <div className="field">
              <label htmlFor="ls-price">Price (USD)</label>
              <input id="ls-price" className="input" type="number" min="1" placeholder="12" value={form.price} onChange={set('price')}/>
            </div>
            <div className="field">
              <label htmlFor="ls-unit">Rate</label>
              <select id="ls-unit" className="select" value={form.unit} onChange={set('unit')}>
                <option value="/day">per day</option>
                <option value="/event">per event</option>
                <option value="/hr">per hour</option>
              </select>
            </div>
          </div>
          <div className="field">
            <label htmlFor="ls-type">Spot type</label>
            <select id="ls-type" className="select" value={form.type} onChange={set('type')}>
              {SPOT_TYPES.map(t=> <option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div className="field">
            <label htmlFor="ls-photo">Photo URL <span className="opt">(optional)</span></label>
            <input id="ls-photo" className="input" placeholder="https://… (leave blank for a placeholder)" value={form.photo} onChange={set('photo')}/>
          </div>
          <div className="field">
            <label>Amenities</label>
            <div className="am-grid">
              {AMENITIES.map(([ic,t])=>{
                const on=amenities.includes(ic);
                return (
                  <button type="button" key={ic} className={`am ${on?'on':''}`} aria-pressed={on} onClick={()=>toggleAm(ic)}>
                    <Icon name={ic} size={16}/> {t}
                    {on && <span className="am-chk"><Icon name="check" size={16}/></span>}
                  </button>
                );
              })}
            </div>
          </div>
          <button className="btn btn-primary btn-block" style={{height:50,fontSize:16,marginTop:6}} disabled={!valid} onClick={publish}>
            <Icon name="check" size={20}/> Publish listing
          </button>
        </div>

        <div className="ls-preview">
          <div className="pv-label">Live preview</div>
          <ListingCard l={preview}/>
        </div>
      </div>
    </section>
  );
}

/* ───────── App shell ───────── */
function Nav({onSignup,onView}){
  return (
    <header className="nav">
      <div className="nav-inner">
        <button className="brand" onClick={()=>onView('home')}><span className="blob"><Icon name="car" size={18}/></span> Parking<span>Haus</span></button>
        <nav className="nav-links">
          <button onClick={()=>onSignup('driver')}>Find parking</button>
          <button onClick={()=>onSignup('host')}>Become a host</button>
          <button onClick={()=>onView('styleguide')}>Style guide</button>
        </nav>
        <div className="nav-cta">
          <button className="btn btn-ghost btn-sm" onClick={()=>onSignup('driver')}>Log in</button>
          <button className="btn btn-primary btn-sm" onClick={()=>onSignup('driver')}>Sign up</button>
        </div>
      </div>
    </header>
  );
}

function App(){
  const [view,setView]=useState('home');
  const [signup,setSignup]=useState(null); // {role} | null
  const [hostProfile,setHostProfile]=useState({});
  const [published,setPublished]=useState(()=>{try{return JSON.parse(localStorage.getItem('mkt_listings'))||[];}catch{return [];}});
  const openSignup=(role)=>setSignup({role});

  useEffect(()=>{try{localStorage.setItem('mkt_listings',JSON.stringify(published));}catch{}},[published]);
  useEffect(()=>{ if(view!=='home') window.scrollTo(0,0); },[view]);

  // Wizard complete: drivers go to the live driver app, hosts go to the listing form.
  const onFinish=(role,profile)=>{
    if(role==='host'){ setHostProfile(profile||{}); setView('list-spot'); }
    else { window.location.href='parking.html'; }
  };
  const addListing=(l)=>setPublished(p=>[l,...p]);

  return (
    <div>
      <Nav onSignup={openSignup} onView={setView}/>
      {view==='home' && <main>
        <Hero onSignup={openSignup}/>
        <Benefits/>
        <FeaturedListings extra={published}/>
      </main>}
      {view==='styleguide' && <main><StyleGuide/></main>}
      {view==='list-spot' && <main><ListSpotView hostProfile={hostProfile} onPublish={addListing} onHome={()=>setView('home')}/></main>}
      <footer className="footer">
        <div className="footer-inner">
          <div className="brand"><span className="blob" style={{width:24,height:24}}><Icon name="car" size={15}/></span> Parking<span>Haus</span></div>
          <span style={{marginLeft:'auto'}}>© 2026 Parking Haus · Park smart, earn more.</span>
        </div>
      </footer>
      {signup && <SignupWizard initialRole={signup.role} onClose={()=>setSignup(null)} onFinish={onFinish}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
