function load(k,d){try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function buildGroups(players){
  const f=players.slice(0,12);
  return{
    A:f.slice(0,4).map((p,i)=>({...p,groupId:`A${i+1}`})),
    B:f.slice(4,8).map((p,i)=>({...p,groupId:`B${i+1}`})),
    C:f.slice(8,12).map((p,i)=>({...p,groupId:`C${i+1}`})),
  };
}

function parseSheetCSV(csvText){
  const lines=csvText.trim().split("\n").filter(l=>l.trim());
  if(lines.length<2) return FALLBACK_PLAYERS;
  const rows=lines.slice(1).map(line=>{
    const fields=[];let cur="";let inQ=false;
    for(const c of line){
      if(c==='"'&&!inQ)inQ=true;
      else if(c==='"'&&inQ)inQ=false;
      else if(c===','&&!inQ){fields.push(cur.trim());cur="";}
      else cur+=c;
    }
    fields.push(cur.trim());
    return fields;
  });
  const byEmail={};
  rows.forEach(r=>{
    const em=(r[2]||"").toLowerCase().trim();
    if(em) byEmail[em]={fullName:(r[1]||"").trim(),ntrp:parseFloat(r[3])||3.0,date:(r[0]||"").split(" ")[0]};
  });
  return FALLBACK_PLAYERS.map(p=>{
    const d=byEmail[p.email.toLowerCase()];
    if(!d) return p;
    const parts=d.fullName.split(" ").filter(Boolean);
    const sn=parts.length>=2?`${parts[0]} ${parts[parts.length-1][0]}.`:d.fullName;
    return{...p,name:sn,full:d.fullName,ntrp:d.ntrp,registered:d.date};
  });
}

function parseWaitingList(csvText){
  const confirmed=new Set(FALLBACK_PLAYERS.map(p=>p.email.toLowerCase()));
  const lines=csvText.trim().split("\n").filter(l=>l.trim());
  const out=[];
  lines.slice(1).forEach(line=>{
    const fields=[];let cur="";let inQ=false;
    for(const c of line){
      if(c==='"'&&!inQ)inQ=true;
      else if(c==='"'&&inQ)inQ=false;
      else if(c===','&&!inQ){fields.push(cur.trim());cur="";}
      else cur+=c;
    }
    fields.push(cur.trim());
    const em=(fields[2]||"").toLowerCase().trim();
    if(em&&!confirmed.has(em)){
      const fn=(fields[1]||"").trim();
      const parts=fn.split(" ").filter(Boolean);
      out.push({id:`W${out.length+1}`,name:parts.length>=2?`${parts[0]} ${parts[parts.length-1][0]}.`:fn,full:fn,email:fields[2]||"",ntrp:parseFloat(fields[3])||3.0,registered:(fields[0]||"").split(" ")[0]});
    }
  });
  return out.length?out:WAITING_LIST_DEF;
}

function calcStd(groups,results){
  const out={};
  for(const [g,players] of Object.entries(groups)){
    out[g]=players.map(p=>{
      let w=0,l=0,gw=0,gl=0;
      results.forEach(r=>{
        if(r.s1==null)return;
        if(r.p1===p.groupId){gw+=r.s1;gl+=r.s2;r.s1>r.s2?w++:l++;}
        if(r.p2===p.groupId){gw+=r.s2;gl+=r.s1;r.s2>r.s1?w++:l++;}
      });
      return{...p,w,l,gw,gl,pts:w*2,ratio:gl?parseFloat((gw/gl).toFixed(2)):gw};
    }).sort((a,b)=>b.pts-a.pts||b.ratio-a.ratio);
  }
  return out;
}

function getBR(std){
  return Object.values(std).map(s=>s[1]).filter(Boolean).sort((a,b)=>b.pts-a.pts||b.ratio-a.ratio)[0];
}

function winP(a,b){return 1/(1+Math.pow(10,-(a-b)*400/7/400));}

function calcProbs(groups,results){
  const all=Object.values(groups).flat().filter(p=>!p.isEmpty);
  const out={};all.forEach(p=>{out[p.id]={champ:0,final:0,semi:0};});
  const N=3000;
  for(let i=0;i<N;i++){
    const simStd={};
    for(const [g,players] of Object.entries(groups)){
      const done=results.filter(r=>r.group===g&&r.s1!=null);
      const todo=results.filter(r=>r.group===g&&r.s1==null);
      const all2=[...done];
      todo.forEach(m=>{
        const p1=players.find(p=>p.groupId===m.p1);
        const p2=players.find(p=>p.groupId===m.p2);
        if(!p1||!p2)return;
        const pr=winP(p1.ntrp||3,p2.ntrp||3);
        all2.push(Math.random()<pr?{...m,s1:3,s2:Math.floor(Math.random()*3)}:{...m,s1:Math.floor(Math.random()*3),s2:3});
      });
      simStd[g]=players.map(p=>{
        let w=0,gw=0,gl=0;
        all2.forEach(r=>{
          if(r.p1===p.groupId){gw+=r.s1;gl+=r.s2;if(r.s1>r.s2)w++;}
          if(r.p2===p.groupId){gw+=r.s2;gl+=r.s1;if(r.s2>r.s1)w++;}
        });
        return{...p,w,pts:w*2,ratio:gl?gw/gl:gw};
      }).sort((a,b)=>b.pts-a.pts||b.ratio-a.ratio);
    }
    const gW=[simStd.A[0],simStd.B[0],simStd.C[0]].filter(Boolean);
    const br2=["A","B","C"].map(g=>simStd[g][1]).filter(Boolean).sort((a,b)=>b.pts-a.pts||b.ratio-a.ratio)[0];
    const sf=[...gW,br2].filter(Boolean).slice(0,4);
    sf.forEach(p=>{if(p&&out[p.id])out[p.id].semi++;});
    const sm=(a,b)=>{if(!a)return b;if(!b)return a;return Math.random()<winP(a.ntrp||3,b.ntrp||3)?a:b;};
    const f1=sm(sf[0],sf[3]);const f2=sm(sf[1],sf[2]);
    if(f1&&out[f1.id])out[f1.id].final++;if(f2&&out[f2.id])out[f2.id].final++;
    const c=sm(f1,f2);if(c&&out[c.id])out[c.id].champ++;
  }
  const res={};
  for(const [id,p] of Object.entries(out))
    res[id]={champ:Math.round(p.champ/N*100),final:Math.round(p.final/N*100),semi:Math.round(p.semi/N*100)};
  return res;
}

function H2H({groups}){
  const [selA,setSelA]=useState(null);
  const [selB,setSelB]=useState(null);
  const all=Object.values(groups).flat().filter(p=>!p.isEmpty);
  const prob=selA&&selB?Math.round(winP(selA.ntrp,selB.ntrp)*100):null;
  return(<>
    <div style={{fontSize:11,color:"#4b5563",marginBottom:8}}>Tap two players to compare</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
      {all.map(p=>{
        const sel=selA?.id===p.id||selB?.id===p.id;
        return(<button key={p.id} onClick={()=>{
          if(selA?.id===p.id){setSelA(null);return;}
          if(selB?.id===p.id){setSelB(null);return;}
          if(!selA)setSelA(p);else if(!selB)setSelB(p);else{setSelA(p);setSelB(null);}
        }} style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${sel?"#f59e0b":"#1a1d26"}`,background:sel?"#251d00":"transparent",color:sel?"#f59e0b":"#6b7280",fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>{p.name}</button>);
      })}
    </div>
    {selA&&selB&&prob!=null?
      <div style={{background:"#141720",borderRadius:8,padding:14,textAlign:"center"}}>
        <div style={{fontSize:11,color:"#4b5563",marginBottom:8}}>{selA.name} vs {selB.name}</div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{flex:1}}><div style={{fontFamily:"Bebas Neue",fontSize:30,color:"#f59e0b"}}>{prob}%</div><div style={{fontSize:10,color:"#4b5563"}}>{selA.name}</div></div>
          <div style={{fontSize:11,color:"#374151"}}>vs</div>
          <div style={{flex:1}}><div style={{fontFamily:"Bebas Neue",fontSize:30,color:"#8b5cf6"}}>{100-prob}%</div><div style={{fontSize:10,color:"#4b5563"}}>{selB.name}</div></div>
        </div>
        <div style={{display:"flex",height:7,borderRadius:4,overflow:"hidden"}}>
          <div style={{width:`${prob}%`,background:"#f59e0b"}}/><div style={{flex:1,background:"#8b5cf6"}}/>
        </div>
        <div style={{fontSize:10,color:"#374151",marginTop:5}}>NTRP {selA.ntrp} vs {selB.ntrp}</div>
      </div>:
      <div style={{background:"#141720",borderRadius:8,padding:12,textAlign:"center",color:"#374151",fontSize:11}}>
        {!selA?"Select two players above":"Select one more player"}
      </div>}
  </>);
}

function Toast({msg,visible}){return <div className={`toast${visible?"":" hide"}`}>{msg}</div>;}

function ScoreRow({r,idx,p1,p2,onSave,onClear}){
  const [v1,setV1]=useState(r.s1!=null?String(r.s1):"");
  const [v2,setV2]=useState(r.s2!=null?String(r.s2):"");
  const [editing,setEditing]=useState(false);
  const in1=useRef(null);
  useEffect(()=>{setV1(r.s1!=null?String(r.s1):"");setV2(r.s2!=null?String(r.s2):"");setEditing(false);},[r.s1,r.s2]);
  function submit(){const s1=parseInt(v1),s2=parseInt(v2);if(isNaN(s1)||isNaN(s2)||s1<0||s2<0)return;onSave(idx,s1,s2);setEditing(false);}
  const done=r.s1!=null;
  return(
    <div className={`mi${done?" done":""}`}>
      <span className="mtime">{r.time}</span>
      <span className={`cpill ${cpill(r.court)}`}>C{r.court}</span>
      <span style={{fontSize:9,color:"#374151",minWidth:14,flexShrink:0}}>#{r.n}</span>
      <span className="mplayers">
        <span style={{color:done&&r.s1>r.s2?"#e2dfd8":"#9ca3af"}}>{p1?.name||r.p1}</span>
        <span style={{color:"#374151"}}> v </span>
        <span style={{color:done&&r.s2>r.s1?"#e2dfd8":"#9ca3af"}}>{p2?.name||r.p2}</span>
      </span>
      {!editing&&!done&&<button className="sbtn ghost" style={{fontSize:10,padding:"3px 8px"}} onClick={()=>{setEditing(true);setTimeout(()=>in1.current&&in1.current.focus(),50);}}>Enter</button>}
      {!editing&&done&&<div style={{display:"flex",alignItems:"center",gap:4}}>
        <span className="mscore" style={{color:r.s1>r.s2?"#4ade80":"#f87171"}} onClick={()=>setEditing(true)}>{r.s1}–{r.s2}</span>
        <span style={{fontSize:9,color:"#374151",cursor:"pointer"}} onClick={()=>setEditing(true)}>✎</span>
      </div>}
      {editing&&<div className="score-row">
        <input ref={in1} className="si" type="number" min="0" max="9" value={v1} onChange={e=>setV1(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submit();if(e.key==="Escape")setEditing(false);}}/>
        <span style={{color:"#374151",fontFamily:"Bebas Neue",fontSize:16}}>–</span>
        <input className="si" type="number" min="0" max="9" value={v2} onChange={e=>setV2(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submit();if(e.key==="Escape")setEditing(false);}}/>
        <button className="sbtn" style={{fontSize:10,padding:"4px 8px"}} onClick={submit}>OK</button>
        {done&&<button className="sbtn red" style={{fontSize:10,padding:"4px 8px"}} onClick={()=>{onClear(idx);setEditing(false);setV1("");setV2("");}}>✕</button>}
      </div>}
    </div>
  );
}

function FinalsRow({label,time,court,match,getName,onSave,onClear}){
  const [v1,setV1]=useState(match.s1!=null?String(match.s1):"");
  const [v2,setV2]=useState(match.s2!=null?String(match.s2):"");
  const [editing,setEditing]=useState(false);
  useEffect(()=>{setV1(match.s1!=null?String(match.s1):"");setV2(match.s2!=null?String(match.s2):"");setEditing(false);},[match.s1,match.s2]);
  const w=match.s1!=null?(match.s1>match.s2?match.p1:match.p2):null;
  return(
    <div className="bm">
      <div className="bl">{label} · Cancha {court} · {time}</div>
      {[{pid:match.p1,sc:match.s1,isWin:match.p1===w},{pid:match.p2,sc:match.s2,isWin:match.p2===w}].map((sl,si)=>(
        <div key={si} className={`bp${sl.isWin?" win":""}${!sl.pid?" tbd":""}`}>
          <span>{sl.pid?getName(sl.pid):"TBD"}</span>
          {sl.sc!=null&&<span className="bsc">{sl.sc}</span>}
        </div>
      ))}
      <div style={{padding:"8px 13px",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        {!editing?<button className={`sbtn${match.s1!=null?" ghost":""}`} style={{fontSize:10}} onClick={()=>setEditing(true)}>{match.s1!=null?"Edit score":"Enter score"}</button>:
        <><input className="si" type="number" min="0" max="9" value={v1} onChange={e=>setV1(e.target.value)} style={{width:34}}/>
        <span style={{color:"#374151",fontFamily:"Bebas Neue",fontSize:16}}>–</span>
        <input className="si" type="number" min="0" max="9" value={v2} onChange={e=>setV2(e.target.value)} style={{width:34}}/>
        <button className="sbtn" style={{fontSize:10}} onClick={()=>{const s1=parseInt(v1),s2=parseInt(v2);if(!isNaN(s1)&&!isNaN(s2)){onSave(s1,s2);setEditing(false);}}}>Save</button>
        {match.s1!=null&&<button className="sbtn red" style={{fontSize:10}} onClick={()=>{onClear();setEditing(false);}}>✕</button>}
        <button className="sbtn ghost" style={{fontSize:10}} onClick={()=>setEditing(false)}>Cancel</button></>}
      </div>
      {w&&<div style={{padding:"8px 13px",borderTop:"1px solid #1e4a1e",background:"#0a1a0a",textAlign:"center"}}>
        <div style={{fontSize:9,color:"#374151",textTransform:"uppercase",letterSpacing:".07em"}}>Winner</div>
        <div style={{fontFamily:"Bebas Neue",fontSize:18,color:"#4ade80",letterSpacing:2}}>{getName(w)}</div>
      </div>}
    </div>
  );
}

            <div className="div"><div className="dl"/><div className="dt" style={{color:"#f87171"}}>⏳ Lista de espera</div><div className="dl"/></div>
            <div className="card">
              <div className="ch"><span className="ct">En espera · {waitingList.length} jugador{waitingList.length!==1?"es":""}</span><span style={{fontSize:10,color:"#4b5563"}}>Después del puesto #12</span></div>
              {waitingList.map((p,i)=>{
                const[ac,bg]=nCol(p.ntrp||3);
                const ini=p.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
                return(<div key={p.id} className="rr" style={{opacity:.85}}>
                  <div style={{fontSize:12,color:"#f87171",minWidth:20,fontWeight:500,flexShrink:0}}>#{i+1}</div>
                  <div className="av" style={{background:bg,color:ac,width:30,height:30,fontSize:11}}>{ini}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:"#e2dfd8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.full}</div>
                    <div style={{fontSize:10,color:"#4b5563",marginTop:1}}>NTRP {p.ntrp} · Reg. {p.registered}</div>
                  </div>
                  <span className="nb">En espera</span>
                </div>);
              })}
              <div style={{padding:"8px 13px",fontSize:11,color:"#4b5563",textAlign:"center",borderTop:"0.5px solid #0f1118"}}>Si cancela alguien, el primero en lista pasa al torneo.</div>
            </div>
          </>)}
        </>)}

        {/* ══ SCORES ══ */}
        {page==="scores"&&(<>
          <div className="ptitle">Scores</div>
          <div className="psub">{played}/18 jugados · tap Enter · tap score para editar</div>
          <div style={{background:"#141720",borderRadius:8,padding:"10px 13px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:11,color:"#4b5563"}}>Progreso grupos</span>
              <span style={{fontSize:11,color:"#e2dfd8",fontWeight:500}}>{played}/18</span>
            </div>
            <div className="pbar-w" style={{height:10}}><div className="pbar" style={{width:`${Math.round(played/18*100)}%`,background:"#10b981"}}/></div>
          </div>
          <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
            {[["7","5-6 PM"],["10","5-6 PM"],["6","6 PM+"],["8","6 PM+"]].map(([c,t])=>(
              <span key={c} className={`cpill ${cpill(c)}`} style={{padding:"3px 8px",fontSize:10}}>C{c} <span style={{opacity:.7}}>{t}</span></span>
            ))}
          </div>
          {["A","B","C"].map(g=>{
            const[ac]=GC[g];
            const gPlayed=results.filter(r=>r.group===g&&r.s1!=null).length;
            return(<div key={g} style={{marginBottom:14}}>
              <div className="div"><div className="dl"/><div className="dt" style={{color:ac}}>Grupo {g} · {gPlayed}/6</div><div className="dl"/></div>
              {results.filter(r=>r.group===g).map(r=>{
                const idx=results.indexOf(r);
                return(<ScoreRow key={idx} r={r} idx={idx} p1={getP(r.p1)} p2={getP(r.p2)} onSave={saveScore} onClear={clearScore}/>);
              })}
            </div>);
          })}
          <div className="div"><div className="dl"/><div className="dt" style={{color:"#4ade80"}}>Finals</div><div className="dl"/></div>
          <div style={{display:"flex",gap:7,marginBottom:10}}>
            <button className="sbtn grn" style={{fontSize:11}} onClick={fillBracket}>Auto-fill bracket</button>
          </div>
          <FinalsRow label="Semifinal 1" time="6:35 PM" court="6" match={finals.sf1} getName={getName}
            onSave={(s1,s2)=>{setFinals(p=>({...p,sf1:{...p.sf1,s1,s2}}));showToast("SF1 guardado ✓");}}
            onClear={()=>{setFinals(p=>({...p,sf1:{...p.sf1,s1:null,s2:null}}));showToast("SF1 borrado");}}/>
          <FinalsRow label="Semifinal 2" time="6:35 PM" court="8" match={finals.sf2} getName={getName}
            onSave={(s1,s2)=>{setFinals(p=>({...p,sf2:{...p.sf2,s1,s2}}));showToast("SF2 guardado ✓");}}
            onClear={()=>{setFinals(p=>({...p,sf2:{...p.sf2,s1:null,s2:null}}));showToast("SF2 borrado");}}/>
          <FinalsRow label="Final" time="6:55 PM" court="6" match={finals.final} getName={getName}
            onSave={(s1,s2)=>{setFinals(p=>({...p,final:{...p.final,s1,s2}}));showToast("Final guardado ✓");}}
            onClear={()=>{setFinals(p=>({...p,final:{...p.final,s1:null,s2:null}}));showToast("Final borrado");}}/>
          <div style={{padding:"8px 0 4px",textAlign:"center"}}>
            <button className="reset-link" onClick={()=>{if(window.confirm("Borrar TODOS los scores?")){setResults(MATCHES_DEF.map(m=>({...m,s1:null,s2:null})));setFinals({sf1:{p1:null,p2:null,s1:null,s2:null},sf2:{p1:null,p2:null,s1:null,s2:null},final:{p1:null,p2:null,s1:null,s2:null}});showToast("Scores borrados");}}}>Borrar todos los scores</button>
          </div>
        </>)}

        {/* ══ STANDINGS ══ */}
        {page==="standings"&&(<>
          <div className="ptitle">Standings</div>
          <div className="psub">Verde = clasifica · Punto dorado = mejor 2do</div>
          <div className="tb">
            {["A","B","C"].map(g=><button key={g} className={`tbb${gTab===g?" on":""}`} onClick={()=>setGTab(g)}>Grupo {g}</button>)}
          </div>
          <div className="gc">
            <div className="gh" style={{background:GC[gTab][1]}}>
              <span className="gltr" style={{color:GC[gTab][0]}}>Grupo {gTab}</span>
              <span style={{fontSize:10,color:"#4b5563"}}>{results.filter(r=>r.group===gTab&&r.s1!=null).length}/6</span>
            </div>
            <div style={{overflowX:"auto"}}>
              <table className="st" style={{minWidth:320}}>
                <thead><tr><th>#</th><th>Jugador</th><th>W</th><th>L</th><th>GW</th><th>GL</th><th>Pts</th></tr></thead>
                <tbody>{(std[gTab]||groups[gTab]).map((p,i)=>(
                  <tr key={p.id||p.groupId} className={i===0?"q":"d"}>
                    <td><span className={`rn${i===0?" t":""}`}>{i+1}</span></td>
                    <td>{i===0&&<span className="qdot"/>}{i===1&&p.id===br?.id&&<span className="rdot"/>}{p.name}</td>
                    <td style={{color:"#4ade80"}}>{p.w??0}</td><td style={{color:"#f87171"}}>{p.l??0}</td>
                    <td>{p.gw??0}</td><td>{p.gl??0}</td>
                    <td style={{fontFamily:"Bebas Neue",fontSize:16}}>{p.pts??0}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
          <div className="div"><div className="dl"/><div className="dt">Top 4 · van a semis</div><div className="dl"/></div>
          {["A","B","C"].map(g=>{const w=std[g]?.[0];return w?(<div key={g} className="mi" style={{marginBottom:4}}>
            <span className={`gpill g${g}`}>Grp {g}</span>
            <span style={{fontSize:12,color:"#e2dfd8",flex:1}}>{w.name}</span>
            <span style={{fontSize:10,color:"#4ade80"}}>Ganador ✓</span>
          </div>):null;})}
          {br&&<div className="mi">
            <span style={{fontSize:9,padding:"2px 5px",borderRadius:4,background:"#1a1000",color:"#f59e0b",fontWeight:500,flexShrink:0}}>Mejor 2do</span>
            <span style={{fontSize:12,color:"#f59e0b",flex:1}}>{br.name}</span>
            <span style={{fontSize:10,color:"#f59e0b"}}>Wildcard</span>
          </div>}
        </>)}

        {/* ══ BRACKET ══ */}
        {page==="bracket"&&(<>
          <div className="ptitle">Bracket</div>
          <div className="psub">Semis 6:35 PM · Final 6:55 PM · primero a 5 games</div>
          <div style={{display:"flex",gap:7,marginBottom:12}}>
            <button className="sbtn grn" style={{fontSize:11}} onClick={fillBracket}>Auto-fill standings</button>
          </div>
          {["sf1","sf2"].map((key,ki)=>{
            const m=finals[key];const w=m.s1!=null?(m.s1>m.s2?m.p1:m.p2):null;
            return(<div key={key} className="bm">
              <div className="bl">Semifinal {ki+1} · Cancha {ki===0?"6":"8"} · 6:35 PM</div>
              {[{pid:m.p1,sc:m.s1,isWin:m.p1===w},{pid:m.p2,sc:m.s2,isWin:m.p2===w}].map((sl,si)=>(
                <div key={si} className={`bp${sl.isWin?" win":""}${!sl.pid?" tbd":""}`}>
                  <span>{sl.pid?getName(sl.pid):"TBD"}</span>
                  {sl.sc!=null&&<span className="bsc">{sl.sc}</span>}
                </div>
              ))}
            </div>);
          })}
          {(()=>{
            const m=finals.final;const w=m.s1!=null?(m.s1>m.s2?m.p1:m.p2):null;
            return(<div className="bm" style={{border:"1px solid #1e4a1e"}}>
              <div className="bl" style={{color:"#4ade80"}}>FINAL · Cancha 6 · 6:55 PM</div>
              {[{pid:m.p1,sc:m.s1,isWin:m.p1===w},{pid:m.p2,sc:m.s2,isWin:m.p2===w}].map((sl,si)=>(
                <div key={si} className={`bp${sl.isWin?" win":""}${!sl.pid?" tbd":""}`}>
                  <span>{sl.pid?getName(sl.pid):"TBD"}</span>
                  {sl.sc!=null&&<span className="bsc">{sl.sc}</span>}
                </div>
              ))}
              {w&&<div style={{padding:"8px 13px",borderTop:"1px solid #1e4a1e",background:"#0a1a0a",textAlign:"center"}}>
                <div style={{fontSize:9,color:"#374151",textTransform:"uppercase",letterSpacing:".07em"}}>Campeón</div>
                <div style={{fontFamily:"Bebas Neue",fontSize:20,color:"#4ade80",letterSpacing:2}}>{getName(w)}</div>
              </div>}
            </div>);
          })()}
        </>)}

        {/* ══ ODDS ══ */}
        {page==="odds"&&(<>
          <div className="ptitle">Win Odds</div>
          <div className="psub">Monte Carlo · 3,000 sims · se actualiza con cada score</div>
          <div className="card" style={{marginBottom:10}}>
            <div className="ch"><span className="ct">Probabilidad de campeonato</span></div>
            {Object.values(groups).flat().filter(p=>!p.isEmpty)
              .sort((a,b)=>(probs[b.id]?.champ||0)-(probs[a.id]?.champ||0))
              .map((p,i)=>{
                const pr=probs[p.id]||{champ:0,final:0,semi:0};
                const[ac,bg]=nCol(p.ntrp);
                const ini=p.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
                const grp=Object.entries(groups).find(([,ps])=>ps.some(x=>x.id===p.id));
                const bc=i===0?"#f59e0b":i===1?"#9ca3af":i===2?"#b87333":"#374151";
                return(<div key={p.id} style={{padding:"10px 13px",borderBottom:"1px solid #0f1118"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <div className="av" style={{background:bg,color:ac,width:30,height:30,fontSize:11,flexShrink:0}}>{ini}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12,color:"#e2dfd8",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                      <div style={{display:"flex",gap:5,marginTop:2}}>
                        <span className="nb">NTRP {p.ntrp}</span>
                        {grp&&<span className={`gpill g${grp[0]}`}>Grp {grp[0]}</span>}
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontFamily:"Bebas Neue",fontSize:24,color:bc,lineHeight:1}}>{pr.champ}%</div>
                      <div style={{fontSize:9,color:"#374151"}}>to win</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                    <div className="pbar-w"><div className="pbar" style={{width:`${pr.champ}%`,background:bc}}/></div>
                  </div>
                  <div style={{display:"flex",gap:12}}>
                    <span style={{fontSize:10,color:"#4b5563"}}>Semis: <span style={{color:"#9ca3af"}}>{pr.semi}%</span></span>
                    <span style={{fontSize:10,color:"#4b5563"}}>Final: <span style={{color:"#9ca3af"}}>{pr.final}%</span></span>
                  </div>
                </div>);
              })}
          </div>
          <div className="card"><div className="ch"><span className="ct">Head-to-head</span></div><div style={{padding:"10px 13px"}}><H2H groups={groups}/></div></div>
        </>)}

        {/* ══ INFO ══ */}
        {page==="info"&&(<>
          <div className="ptitle">Info</div>
          <div className="psub">Pineapple Open · Viernes 24 Abr 2026</div>
          <div className="card" style={{marginBottom:10}}>
            <div className="ch"><span className="ct">Evento</span></div>
            <div className="cb">
              {[["Fecha","Viernes 24 Abr 2026"],["Hora","5:00 – 8:00 PM"],["Lugar","Key Colony Beach, FL"],["Canchas","7&10 (5-6pm) · 6&8 (6pm+)"],["Inscripción","$40 via Zelle"],["Premios","Amazon gift cards 1ro & 2do"],["Extras","Bebidas + finger food"]].map(([l,v])=>(
                <div key={l} className="ir"><span className="il">{l}</span><span className="iv">{v}</span></div>
              ))}
            </div>
          </div>
          <div className="card" style={{marginBottom:10}}>
            <div className="ch"><span className="ct">Formato</span></div>
            <div className="cb">
              {[["Grupos","Primero en llegar a 3 games"],["Semis & Final","Primero en llegar a 5 games"],["Scoring","No-ad · golden point en deuce"],["Duración match","15–20 min cada partido"],["Clasifican","3 ganadores de grupo + mejor 2do"],["Desempate","Pts → H2H → ratio → sorteo"]].map(([l,v])=>(
                <div key={l} className="ir"><span className="il">{l}</span><span className="iv" style={{maxWidth:"55%"}}>{v}</span></div>
              ))}
            </div>
          </div>
          <div className="card" style={{marginBottom:10}}>
            <div className="ch"><span className="ct">Grupos</span></div>
            <div className="cb">
              {[["Grupo A",`Franco (4.5) · Patricio (3.5) · Charlie (2.5) · Eugenio (3.0)`],["Grupo B","Nicolas (5.0) · Agus (4.0) · David (2.5) · Maximo (3.0)"],["Grupo C","Juancri (4.5) · R.Mendoza (3.5) · Gon Bader (3.0) · Luis C. (3.0)"]].map(([l,v])=>(
                <div key={l} className="ir"><span className="il">{l}</span><span className="iv" style={{maxWidth:"60%",fontSize:11}}>{v}</span></div>
              ))}
            </div>
          </div>
          <div style={{padding:"4px 0 12px",textAlign:"center"}}>
            <button className="reset-link" onClick={()=>{if(window.confirm("Reset TODO? Scores y pagos se borran.")){setResults(MATCHES_DEF.map(m=>({...m,s1:null,s2:null})));setPayments({});setFinals({sf1:{p1:null,p2:null,s1:null,s2:null},sf2:{p1:null,p2:null,s1:null,s2:null},final:{p1:null,p2:null,s1:null,s2:null}});showToast("Reset completo");}}}>Reset todos los datos</button>
          </div>
        </>)}

      </div>

      <div className="bnav">
        {NAV.map(p=>(
          <button key={p.id} className={`bn${page===p.id?" on":""}`} onClick={()=>setPage(p.id)}>
            <span className="bn-ic">{p.ic}</span>
            <span>{p.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
