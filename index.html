html,body,#root{min-height:100vh;}
body{background:#080a0e;color:#e2dfd8;font-family:'DM Sans',sans-serif;font-size:14px;-webkit-tap-highlight-color:transparent;}

/* TAB BAR */
.tb{display:flex;gap:2px;background:#0b0d12;border-radius:8px;padding:2px;margin-bottom:10px;border:1px solid #1a1d26;}

.tbb.active{background:#1a1d26;color:#e2dfd8;}

/* REG ROWS */

.pb{font-size:10px;padding:3px 8px;border-radius:9px;font-weight:500;white-space:nowrap;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* PROB BAR */
.pbar-wrap{background:#141720;border-radius:6px;height:8px;overflow:hidden;flex:1;}
.pbar{height:100%;border-radius:6px;transition:width .5s ease;}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .2s ease both;}
.ld{width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;vertical-align:middle;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2s infinite;}

/* LINKEDIN */
.li-link{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#60a5fa;text-decoration:none;padding:2px 6px;border:1px solid #1a2535;border-radius:4px;}
.li-link:hover{background:#1a2535;}

<script type="text/babel">
const {useState,useEffect}=React;

const PLAYERS=[
  {id:"R1",name:"Rafael Mendoza",full:"Rafael Mendoza de la Torre",email:"Rafa.mendo@icloud.com",ntrp:3.5,registered:"4/19",paid:false,linkedin:"https://www.linkedin.com/in/rafaelmendozadelatorre/",city:"Miami"},
  {id:"R2",name:"Juancri Sánchez",full:"Juancri Sánchez",email:"jcrisanchez@gmail.com",ntrp:4.5,registered:"4/19",paid:false,linkedin:"https://www.linkedin.com/search/results/all/?keywords=Juancri+Sanchez+Miami",city:"Miami"},
  {id:"R3",name:"Mateo Marietti",full:"Mateo Marietti",email:"mateomarietti@gmail.com",ntrp:3.0,registered:"4/19",paid:false,linkedin:"https://www.linkedin.com/search/results/all/?keywords=Mateo+Marietti+Miami",city:"Miami"},
  {id:"R4",name:"Gon Bader",full:"Gonzalo Bader",email:"Badergonzalo@yahoo.com.ar",ntrp:3.0,registered:"4/19",paid:false,linkedin:"https://www.linkedin.com/search/results/all/?keywords=Gonzalo+Bader+Miami",city:"Miami"},
  {id:"R5",name:"Maximo Razetti",full:"Maximo Razetti",email:"Maximo.razetti@gmail.com",ntrp:3.5,registered:"4/21",paid:false,linkedin:"https://www.linkedin.com/search/results/all/?keywords=Maximo+Razetti+Miami",city:"Miami"},
  {id:"R6",name:"Morla Álvarez",full:"Rafael Morla Álvarez",email:"alvarezpaullier10@gmail.com",ntrp:3.5,registered:"4/21",paid:false,linkedin:"https://www.linkedin.com/search/results/all/?keywords=Rafael+Alvarez+Paullier+Miami",city:"Miami"},
];

const EMPTY=(id,slot)=>({id,name:`Slot ${slot}`,full:`Open slot ${slot}`,email:"",ntrp:0,registered:"—",paid:false,isEmpty:true,linkedin:""});

function buildGroups(reg){
  const f=[...reg];
  while(f.length<12){const s=f.length+1;f.push(EMPTY(`OPEN${s}`,s));}
  // Rafael Mendoza → Group C (swap pos 0 and 8)
  const sw=[...f];const tmp=sw[0];sw[0]=sw[8];sw[8]=tmp;
  return{
    A:sw.slice(0,4).map((p,i)=>({...p,groupId:`A${i+1}`})),
    B:sw.slice(4,8).map((p,i)=>({...p,groupId:`B${i+1}`})),
    C:sw.slice(8,12).map((p,i)=>({...p,groupId:`C${i+1}`})),
  };
}

// New schedule: 4 courts, 15-20 min per match, group stage 5:00-6:30, semis+final 6:45-8:00
const MATCHES=[
  // Round 1 at 5:00 — all 3 groups start simultaneously on 4 courts (A uses courts 1&2, B uses 3&4, C waits)
  {group:"A",p1:"A1",p2:"A2",court:1,time:"5:00",matchNum:1},
  {group:"A",p1:"A3",p2:"A4",court:2,time:"5:00",matchNum:2},
  {group:"B",p1:"B1",p2:"B2",court:3,time:"5:00",matchNum:3},
  {group:"B",p1:"B3",p2:"B4",court:4,time:"5:00",matchNum:4},
  // Round 2 at 5:20
  {group:"A",p1:"A1",p2:"A3",court:1,time:"5:20",matchNum:5},
  {group:"A",p1:"A2",p2:"A4",court:2,time:"5:20",matchNum:6},
  {group:"B",p1:"B1",p2:"B3",court:3,time:"5:20",matchNum:7},
  {group:"B",p1:"B2",p2:"B4",court:4,time:"5:20",matchNum:8},
  // Round 3 at 5:40 — Group C gets courts 1&2, Group A&B finish on 3&4
  {group:"C",p1:"C1",p2:"C2",court:1,time:"5:40",matchNum:9},
  {group:"C",p1:"C3",p2:"C4",court:2,time:"5:40",matchNum:10},
  {group:"A",p1:"A1",p2:"A4",court:3,time:"5:40",matchNum:11},
  {group:"A",p1:"A2",p2:"A3",court:4,time:"5:40",matchNum:12},
  // Round 4 at 6:00
  {group:"C",p1:"C1",p2:"C3",court:1,time:"6:00",matchNum:13},
  {group:"C",p1:"C2",p2:"C4",court:2,time:"6:00",matchNum:14},
  {group:"B",p1:"B1",p2:"B4",court:3,time:"6:00",matchNum:15},
  {group:"B",p1:"B2",p2:"B3",court:4,time:"6:00",matchNum:16},
  // Round 5 at 6:20
  {group:"C",p1:"C1",p2:"C4",court:1,time:"6:20",matchNum:17},
  {group:"C",p1:"C2",p2:"C3",court:2,time:"6:20",matchNum:18},
];

function calcStandings(groups,results){
  const out={};
  for(const [g,players] of Object.entries(groups)){
    out[g]=players.map(p=>{
      let w=0,l=0,gw=0,gl=0;
      results.forEach(r=>{
        if(r.s1===null||r.s1===undefined)return;
        if(r.p1===p.groupId){gw+=r.s1;gl+=r.s2;if(r.s1>r.s2)w++;else l++;}
        if(r.p2===p.groupId){gw+=r.s2;gl+=r.s1;if(r.s2>r.s1)w++;else l++;}
      });
      const ratio=gl===0?(gw>0?gw:0):parseFloat((gw/gl).toFixed(2));
      return{...p,w,l,gw,gl,pts:w*2,ratio};
    }).sort((a,b)=>b.pts-a.pts||b.ratio-a.ratio);
  }
  return out;
}

function getBR(standings){
  return Object.values(standings).map(s=>s[1]).filter(Boolean).sort((a,b)=>b.pts-a.pts||b.ratio-a.ratio)[0];
}

// Win probability based on NTRP ratings using Elo-like formula
function winProb(ntrpA,ntrpB){
  const diff=(ntrpA-ntrpB)*400/7;
  return 1/(1+Math.pow(10,-diff/400));
}

// Tournament win probability via Monte Carlo simulation
function calcTournamentProbs(groups,standings,results){
  const allPlayers=Object.values(groups).flat().filter(p=>!p.isEmpty);
  const probs={};
  allPlayers.forEach(p=>{probs[p.id]={champion:0,finalist:0,semis:0};});
  
  const N=5000;
  for(let sim=0;sim<N;sim++){
    // Determine group winners and best runner-up
    const simStd={};
    for(const [g,players] of Object.entries(groups)){
      // Use actual results where available, simulate the rest
      const simRes=[...results.filter(r=>r.group===g&&r.s1!==null)];
      const pending=results.filter(r=>r.group===g&&r.s1===null);
      pending.forEach(m=>{
        const p1=players.find(p=>p.groupId===m.p1);
        const p2=players.find(p=>p.groupId===m.p2);
        if(!p1||!p2)return;
        const p=winProb(p1.ntrp||3.0,p2.ntrp||3.0);
        if(Math.random()<p) simRes.push({...m,s1:3,s2:Math.floor(Math.random()*3)});
        else simRes.push({...m,s1:Math.floor(Math.random()*3),s2:3});
      });
      simStd[g]=players.map(p=>{
        let w=0,gw=0,gl=0;
        simRes.forEach(r=>{
          if(r.p1===p.groupId){gw+=r.s1;gl+=r.s2;if(r.s1>r.s2)w++;}
          if(r.p2===p.groupId){gw+=r.s2;gl+=r.s1;if(r.s2>r.s1)w++;}
        });
        const ratio=gl===0?gw:gw/gl;
        return{...p,w,pts:w*2,ratio};
      }).sort((a,b)=>b.pts-a.pts||b.ratio-a.ratio);
    }
    
    const gWinners=[simStd.A[0],simStd.B[0],simStd.C[0]].filter(Boolean);
    const runners=["A","B","C"].map(g=>simStd[g][1]).filter(Boolean).sort((a,b)=>b.pts-a.pts||b.ratio-a.ratio);
    const bestR=runners[0];
    const sf=[...gWinners,bestR].filter(Boolean).slice(0,4);
    
    sf.forEach(p=>{if(p&&probs[p.id])probs[p.id].semis++;});
    
    // Semis
    const sf1=[sf[0],sf[3]].filter(Boolean);
    const sf2=[sf[1],sf[2]].filter(Boolean);
    
    function simMatch(a,b){
      if(!a)return b;if(!b)return a;
      return Math.random()<winProb(a.ntrp||3.0,b.ntrp||3.0)?a:b;
    }
    
    const fw1=simMatch(sf1[0],sf1[1]);
    const fw2=simMatch(sf2[0],sf2[1]);
    if(fw1&&probs[fw1.id])probs[fw1.id].finalist++;
    if(fw2&&probs[fw2.id])probs[fw2.id].finalist++;
    
    const champ=simMatch(fw1,fw2);
    if(champ&&probs[champ.id])probs[champ.id].champion++;
  }
  
  // Normalize
  const result={};
  for(const [id,p] of Object.entries(probs)){
    result[id]={
      champion:Math.round(p.champion/N*100),
      finalist:Math.round(p.finalist/N*100),
      semis:Math.round(p.semis/N*100),
    };
  }
  return result;
}

function ntrpCol(n){
  const v=parseFloat(n)||0;
  if(v>=4.5)return["#8b5cf6","#1e1630"];
  if(v>=4.0)return["#10b981","#001a0e"];
  if(v>=3.5)return["#f59e0b","#171200"];
  if(v>0)return["#60a5fa","#0f1e30"];
  return["#374151","#141720"];
}

const GC={A:["#f59e0b","#171200"],B:["#10b981","#001a0e"],C:["#8b5cf6","#100018"]};

const PAGES=[
  {id:"dashboard",label:"Home",icon:"⌂"},
  {id:"players",label:"Players",icon:"◉"},
  {id:"fixture",label:"Fixture",icon:"▤"},
  {id:"standings",label:"Table",icon:"≡"},
  {id:"bracket",label:"Bracket",icon:"⟁"},
  {id:"probs",label:"Odds",icon:"◎"},
  {id:"info",label:"Info",icon:"ℹ"},
];

function App(){
  const [page,setPage]=useState("dashboard");
  const [reg,setReg]=useState(PLAYERS);
  const [groups,setGroups]=useState(()=>buildGroups(PLAYERS));
  const [results,setResults]=useState(MATCHES.map(m=>({...m,s1:null,s2:null})));
  const [finals,setFinals]=useState({sf1:{p1:null,p2:null,s1:null,s2:null},sf2:{p1:null,p2:null,s1:null,s2:null},final:{p1:null,p2:null,s1:null,s2:null}});
  const [esc,setEsc]=useState({});
  const [ef,setEf]=useState({});
  const [gTab,setGTab]=useState("A");

  const std=calcStandings(groups,results.filter(r=>r.s1!==null));
  const br=getBR(std);
  const played=results.filter(r=>r.s1!==null).length;
  const paid=reg.filter(r=>r.paid).length;
  const champ=finals.final.s1!==null?(finals.final.s1>finals.final.s2?finals.final.p1:finals.final.p2):null;
  const tournProbs=calcTournamentProbs(groups,std,results);

  function getP(gid){for(const ps of Object.values(groups)){const p=ps.find(x=>x.groupId===gid);if(p)return p;}return null;}
  function getName(gid){const p=getP(gid);return p?p.name:gid;}

  function saveScore(idx){
    const e=esc[idx];if(!e||e.s1===""||e.s2==="")return;
    const s1=parseInt(e.s1),s2=parseInt(e.s2);if(isNaN(s1)||isNaN(s2))return;
    setResults(prev=>prev.map((r,i)=>i===idx?{...r,s1,s2}:r));
    setEsc(prev=>{const n={...prev};delete n[idx];return n;});
  }

  function saveFinal(key){
    const e=ef[key];if(!e)return;
    const s1=parseInt(e.s1),s2=parseInt(e.s2);if(isNaN(s1)||isNaN(s2))return;
    setFinals(prev=>({...prev,[key]:{...prev[key],s1,s2}}));
    setEf(prev=>{const n={...prev};delete n[key];return n;});
  }

  function fillBracket(){
    setFinals(prev=>({
      sf1:{...prev.sf1,p1:std.A?.[0]?.groupId||null,p2:br?.groupId||null},
      sf2:{...prev.sf2,p1:std.B?.[0]?.groupId||null,p2:std.C?.[0]?.groupId||null},
      final:prev.final,
    }));
  }

  useEffect(()=>{
    const sf1w=finals.sf1.s1!==null?(finals.sf1.s1>finals.sf1.s2?finals.sf1.p1:finals.sf1.p2):null;
    const sf2w=finals.sf2.s1!==null?(finals.sf2.s1>finals.sf2.s2?finals.sf2.p1:finals.sf2.p2):null;
    if(sf1w||sf2w)setFinals(prev=>({...prev,final:{...prev.final,p1:sf1w,p2:sf2w}}));
  },[finals.sf1.s1,finals.sf1.s2,finals.sf2.s1,finals.sf2.s2]);

  function togglePaid(id){setReg(prev=>prev.map(p=>p.id===id?{...p,paid:!p.paid}:p));}

  const cpill=(c)=>{
    if(c===1)return"c1p";if(c===2)return"c2p";if(c===3)return"c3p";return"c4p";

          <div style={{fontFamily:"Bebas Neue",fontSize:28,letterSpacing:2,color:"#fff",marginBottom:2}}>Info</div>
          <div style={{fontSize:11,color:"#4b5563",marginBottom:10}}>Key Colony Open · April 25, 2025</div>

          <div className="card" style={{marginBottom:10}}>
            <div className="ch"><span className="ct">Event details</span></div>
            <div className="cb">
              {[
                ["Date","Friday, April 25, 2025"],
                ["Time","5:00 PM – 8:00 PM"],
                ["Location","Key Colony Beach, FL"],
                ["Courts","4 (group) → 2 (finals)"],
                ["Entry fee","$40 via Zelle"],
                ["Prizes","Amazon gift cards · 1st & 2nd"],
                ["Extras","Drinks + finger food"],
              ].map(([l,v])=>(
                <div key={l} className="ir"><span className="il">{l}</span><span className="iv">{v}</span></div>
              ))}
            </div>
          </div>

          <div className="card" style={{marginBottom:10}}>
            <div className="ch"><span className="ct">Match format</span></div>
            <div className="cb">
              {[
                ["Group matches","First to 3 games wins"],
                ["Scoring","No-ad · golden point on deuce"],
                ["Semis & Final","1 set to 6 games · tiebreak at 6-6"],
                ["Group match time","15–20 min each"],
                ["Tiebreaker","Pts → H2H → Game ratio → coin"],
                ["Advances","3 group winners + best runner-up"],
              ].map(([l,v])=>(
                <div key={l} className="ir"><span className="il">{l}</span><span className="iv" style={{maxWidth:"55%"}}>{v}</span></div>
              ))}
            </div>
          </div>

          <div className="card">
            <div className="ch"><span className="ct">Court plan</span></div>
            <div className="cb">
              <div style={{fontSize:12,color:"#e2dfd8",fontWeight:500,marginBottom:6}}>Group stage (5:00–6:30 PM)</div>
              {[
                ["Courts 1 & 2","Groups A & C"],
                ["Courts 3 & 4","Group B"],
              ].map(([l,v])=>(
                <div key={l} className="ir"><span className="il">{l}</span><span className="iv">{v}</span></div>
              ))}
              <div style={{fontSize:12,color:"#e2dfd8",fontWeight:500,margin:"10px 0 6px"}}>Finals (6:45–8:00 PM)</div>
              {[
                ["Court 1","Semifinal 1 → Final"],
                ["Court 2","Semifinal 2"],
                ["Courts 3 & 4","Released"],
              ].map(([l,v])=>(
                <div key={l} className="ir"><span className="il">{l}</span><span className="iv">{v}</span></div>
              ))}
            </div>
          </div>
        </>)}

      </div>

      {/* BOTTOM NAV */}
      <div className="bnav">
        {PAGES.map(p=>(
          <button key={p.id} className={`bn${page===p.id?" active":""}`} onClick={()=>setPage(p.id)}>
            <span className="bn-icon">{p.icon}</span>
            <span>{p.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
